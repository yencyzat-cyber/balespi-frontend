<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Balespi Import PRO</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    
    /* CAMBIO A MODO CLARO (LIGHT THEME) */
    html,body{height:100%;font-family:-apple-system,'Inter',sans-serif;background:#f4f5f8;color:#1a1a1c;-webkit-font-smoothing:antialiased;overflow:hidden}
    input,select,button,textarea{font-family:inherit}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}
    @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes slideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes fadeUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes bounceIn{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.92)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .hap{transition:transform .12s cubic-bezier(.34,1.56,.64,1),opacity .1s;cursor:pointer}
    .hap:active{transform:scale(.88)!important;opacity:.72}
    
    .shell{width:100%;height:100vh;background:#f4f5f8;display:flex;flex-direction:column;position:relative;overflow:hidden}
    .sidebar{display:none}
    .bottom-nav-mobile{display:flex}
    .cart-float{position:fixed;bottom:80px;z-index:500;left:14px;right:14px;animation:slideUp .3s cubic-bezier(.34,1.2,.64,1) both}
    
    @media(min-width:768px){
      body{background:linear-gradient(135deg,#f4f5f8 0%,#ffffff 60%,#f0f2f5 100%)}
      .shell{max-width:100%;margin:0;flex-direction:row;box-shadow:none}
      .sidebar{display:flex;flex-direction:column;width:220px;flex-shrink:0;background:rgba(255,255,255,.8);border-right:1px solid rgba(0,0,0,.08)}
      .bottom-nav-mobile{display:none!important}
      .main-topbar-logo{display:none!important}
      .cart-float{
        left: 220px;
        right: 0;
        bottom: 24px;
        display: flex;
        justify-content: center;
        padding: 0 16px;
        pointer-events: none;
      }
      .cart-float > button {
        max-width: 500px;
        pointer-events: auto;
      }
      .prod-grid-scroll{padding-bottom:90px!important}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;
const API_URL = "https://balespi-api.onrender.com";

// NUEVA PALETA DE COLORES (Lila, Rosado, Magenta)
const ROLES = {
  admin:    {key:"admin",    label:"Administrador", sub:"Acceso completo",        icon:"✦", accent:"#a855f7", grad:"linear-gradient(135deg,#c084fc,#9333ea)"},
  vendedor: {key:"vendedor", label:"Vendedor Live",  sub:"Live · TikTok · WhatsApp", icon:"◈", accent:"#ec4899", grad:"linear-gradient(135deg,#f472b6,#db2777)"},
  tienda:   {key:"tienda",   label:"Cajero Tienda",  sub:"Ventas en mostrador",      icon:"◉", accent:"#f43f5e", grad:"linear-gradient(135deg,#fb7185,#e11d48)"},
};
const STATUS_MAP = {
  pago_pendiente:{label:"Pendiente",color:"#f59e0b"},
  pago_recibido:{label:"Pago recibido",color:"#f59e0b"},
  verificado:{label:"Verificado",color:"#10b981"},
  embalando:{label:"Embalando",color:"#636cf1"},
  enviado:{label:"En camino",color:"#0ea5e9"},
  entregado:{label:"Entregado",color:"#10b981"},
  cancelado:{label:"Cancelado",color:"#ef4444"},
};
const FLOW = ["pago_pendiente","pago_recibido","verificado","embalando","enviado","entregado"];

const f = n => `S/ ${Number(n||0).toFixed(2)}`;
const uid = () => Math.random().toString(36).slice(2,7).toUpperCase();
const ago = d => {
  const ms=Date.now()-new Date(d).getTime();
  if(ms<60000) return "ahora";
  if(ms<3600000) return Math.floor(ms/60000)+"m";
  if(ms<86400000) return Math.floor(ms/3600000)+"h";
  return Math.floor(ms/86400000)+"d";
};
const applyDisc=(n,pct)=>pct>0?n*(1-pct/100):n;

const normProd=p=>({
  ...p,
  stockTienda:p.stock_tienda??p.stockTienda??0,
  stockLive:p.stock_live??p.stockLive??0,
  stockMin:p.stock_min??p.stockMin??10,
  perDozen:p.per_dozen??p.perDozen??12,
  perBox:p.per_box??p.perBox??20,
  prices:{
    tienda:p.price_tienda??p.prices?.tienda??0,
    live:p.price_live??p.prices?.live??0,
    docena_unit:p.price_docena??p.prices?.docena_unit??0,
    cajon_unit:p.price_cajon??p.prices?.cajon_unit??0,
  },
  promo:p.promo_pct>0?{pct:p.promo_pct,label:`${p.promo_pct}% OFF`}:(p.promo??null),
  photo:p.photo_url??p.photo??null,
  icon:p.icon??"📦",
  cat:p.category??p.cat??"General",
  active:p.active!==false,
  sku:p.sku??String(p.id),
});
const calcUnits=(p,type,qty)=>{
  if(type==="unidad") return qty;
  if(type==="docena") return qty*(p.perDozen||12);
  if(type==="cajon")  return qty*(p.perBox||20);
  return qty;
};
const calcPrice=(p,channel,type)=>{
  if(type==="docena") return p.prices.docena_unit*(p.perDozen||12);
  if(type==="cajon")  return p.prices.cajon_unit*(p.perBox||20);
  const base=channel==="tienda"?p.prices.tienda:p.prices.live;
  return p.promo?applyDisc(base,p.promo.pct):base;
};

function Ambient({rk}){
  const m={admin:["#a855f7","#636cf1"],vendedor:["#ec4899","#a855f7"],tienda:["#f43f5e","#ec4899"]};
  const [c1,c2]=m[rk]||["#ec4899","#a855f7"];
  return(
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
      <div style={{position:"absolute",top:"-20%",left:"-10%",width:"60%",height:"60%",background:`radial-gradient(ellipse,${c1}12 0%,transparent 70%)`,animation:"float 8s ease-in-out infinite"}}/>
      <div style={{position:"absolute",bottom:"-10%",right:"-10%",width:"50%",height:"50%",background:`radial-gradient(ellipse,${c2}09 0%,transparent 70%)`,animation:"float 11s ease-in-out infinite reverse"}}/>
    </div>
  );
}
function Toasts({toasts,rm}){
  return(
    <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
      {toasts.map(t=>(
        <div key={t.id} onClick={()=>rm(t.id)} style={{
          background:t.type==="ok"?"rgba(16,185,129,.15)":t.type==="warn"?"rgba(245,158,11,.15)":"rgba(239,68,68,.15)",
          backdropFilter:"blur(32px)",border:`1px solid ${t.type==="ok"?"rgba(16,185,129,.3)":t.type==="warn"?"rgba(245,158,11,.3)":"rgba(239,68,68,.3)"}`,
          borderRadius:20,padding:"11px 20px",fontSize:13,fontWeight:600,
          color:t.type==="ok"?"#059669":t.type==="warn"?"#d97706":"#dc2626",
          boxShadow:"0 8px 32px rgba(0,0,0,.08)",animation:"slideDown .3s cubic-bezier(.34,1.56,.64,1) both",
          cursor:"pointer",whiteSpace:"nowrap",maxWidth:360,textAlign:"center"}}>
          {t.msg}
        </div>
      ))}
    </div>
  );
}
function Sheet({open,onClose,title,children}){
  if(!open) return null;
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{
      position:"fixed",inset:0,background:"rgba(0,0,0,.35)",backdropFilter:"blur(8px)",
      zIndex:800,display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeIn .2s ease both"}}>
      <div style={{width:"100%",maxWidth:600,maxHeight:"92vh",display:"flex",flexDirection:"column",
        background:"rgba(255,255,255,.98)",backdropFilter:"blur(40px)",
        borderRadius:"28px 28px 0 0",border:"1px solid rgba(0,0,0,.08)",borderBottom:"none",
        boxShadow:"0 -24px 80px rgba(0,0,0,.15)",animation:"slideUp .32s cubic-bezier(.34,1.1,.64,1) both"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"14px 0 4px",flexShrink:0}}>
          <div style={{width:40,height:4,background:"rgba(0,0,0,.15)",borderRadius:2}}/>
        </div>
        <div style={{padding:"8px 22px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <h3 style={{fontSize:18,fontWeight:800,color:"#111"}}>{title}</h3>
          <button onClick={onClose} className="hap" style={{background:"rgba(0,0,0,.05)",border:"1px solid rgba(0,0,0,.05)",borderRadius:50,width:34,height:34,color:"#111",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{overflowY:"auto",padding:"0 22px 40px",flex:1}}>{children}</div>
      </div>
    </div>
  );
}
function Pill({status}){
  const st=STATUS_MAP[status]||{label:status,color:"#888"};
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:5,background:`${st.color}18`,color:st.color,border:`1px solid ${st.color}33`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>
      <span style={{fontSize:7}}>●</span>{st.label}
    </span>
  );
}
function GInput({label,value,onChange,type="text",placeholder,icon}){
  return(
    <div>
      {label&&<div style={{fontSize:11,fontWeight:600,color:"rgba(0,0,0,.5)",letterSpacing:1.2,textTransform:"uppercase",marginBottom:7}}>{label}</div>}
      <div style={{position:"relative"}}>
        {icon&&<span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none"}}>{icon}</span>}
        <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
          style={{width:"100%",background:"#fff",border:"1px solid rgba(0,0,0,.1)",borderRadius:14,padding:icon?"13px 14px 13px 42px":"13px 16px",color:"#111",fontSize:14,outline:"none"}}
          onFocus={e=>{e.target.style.borderColor="rgba(0,0,0,.25)";e.target.style.boxShadow="0 4px 12px rgba(0,0,0,.03)"}}
          onBlur={e=>{e.target.style.borderColor="rgba(0,0,0,.1)";e.target.style.boxShadow="none"}}/>
      </div>
    </div>
  );
}
function GTextarea({label,value,onChange,placeholder,rows=2}){
  return(
    <div>
      {label&&<div style={{fontSize:11,fontWeight:600,color:"rgba(0,0,0,.5)",letterSpacing:1.2,textTransform:"uppercase",marginBottom:7}}>{label}</div>}
      <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
        style={{width:"100%",background:"#fff",border:"1px solid rgba(0,0,0,.1)",borderRadius:14,padding:"13px 16px",color:"#111",fontSize:14,outline:"none",resize:"none"}}
        onFocus={e=>{e.target.style.borderColor="rgba(0,0,0,.25)";e.target.style.boxShadow="0 4px 12px rgba(0,0,0,.03)"}}
        onBlur={e=>{e.target.style.borderColor="rgba(0,0,0,.1)";e.target.style.boxShadow="none"}}/>
    </div>
  );
}
function SearchBar({value,onChange,placeholder="Buscar..."}){
  return(
    <div style={{position:"relative",marginBottom:12}}>
      <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:16,pointerEvents:"none",opacity:.4}}>🔍</span>
      <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:"100%",background:"#fff",border:"1px solid rgba(0,0,0,.1)",borderRadius:16,padding:"12px 14px 12px 42px",color:"#111",fontSize:14,outline:"none"}}
        onFocus={e=>{e.target.style.borderColor="rgba(0,0,0,.25)";e.target.style.boxShadow="0 4px 12px rgba(0,0,0,.03)"}}
        onBlur={e=>{e.target.style.borderColor="rgba(0,0,0,.1)";e.target.style.boxShadow="none"}}/>
      {value&&<button onClick={()=>onChange("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,.06)",border:"none",borderRadius:50,width:22,height:22,color:"#111",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>}
    </div>
  );
}
function CatChips({cats,active,onChange,accent}){
  return(
    <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:12}}>
      {["Todos",...cats].map(c=>{
        const on=(c==="Todos"&&!active)||(c===active);
        return(
          <button key={c} onClick={()=>onChange(c==="Todos"?null:c)} className="hap" style={{background:on?`${accent}15`:"#fff",border:`1px solid ${on?accent+"50":"rgba(0,0,0,.08)"}`,borderRadius:50,padding:"7px 14px",color:on?accent:"rgba(0,0,0,.6)",fontSize:12,fontWeight:on?700:500,whiteSpace:"nowrap",flexShrink:0,transition:"all .2s"}}>
            {c}
          </button>
        );
      })}
    </div>
  );
}
function StockGauge({p}){
  const tot=p.stockTienda+p.stockLive;
  const pctT=tot>0?(p.stockTienda/tot)*100:50;
  const lowT=p.stockTienda<=p.stockMin;
  const lowL=p.stockLive<=p.stockMin;
  return(
    <div style={{marginTop:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <span style={{fontSize:11,fontWeight:700,color:lowT?"#ef4444":"#f59e0b"}}>🏪 {p.stockTienda}u {lowT&&"⚠"}</span>
        <span style={{fontSize:10,color:"rgba(0,0,0,.4)"}}>total {tot}u</span>
        <span style={{fontSize:11,fontWeight:700,color:lowL?"#ef4444":"#10b981"}}>{lowL&&"⚠"} 📱 {p.stockLive}u</span>
      </div>
      <div style={{height:8,borderRadius:6,overflow:"hidden",display:"flex",background:"rgba(0,0,0,.06)"}}>
        <div style={{width:`${pctT}%`,background:lowT?"#ef4444":"#f59e0b",transition:"width .4s"}}/>
        <div style={{flex:1,background:lowL?"#ef4444":"#10b981"}}/>
      </div>
    </div>
  );
}

/* ── LOGIN ── */
function Login({onLogin}){
  const [sel,setSel]=useState(null);
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28,background:"linear-gradient(160deg,#f8f9fa,#eef2f3 60%,#e2e8f0)",position:"relative",overflow:"hidden"}}>
      <Ambient rk={sel||"tienda"}/>
      <div style={{textAlign:"center",marginBottom:48,animation:"fadeUp .6s both",position:"relative",zIndex:1}}>
        <div style={{width:84,height:84,borderRadius:26,background:"#fff",border:"1px solid rgba(0,0,0,.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,margin:"0 auto 18px",boxShadow:"0 20px 40px rgba(0,0,0,.05)",animation:"float 5s ease-in-out infinite"}}>🛒</div>
        <div style={{fontSize:10,letterSpacing:5,color:"rgba(0,0,0,.4)",fontWeight:600,marginBottom:8}}>SISTEMA DE GESTIÓN</div>
        <h1 style={{fontSize:32,fontWeight:900,letterSpacing:-0.5,color:"#111"}}>Balespi Import</h1>
        <p style={{color:"rgba(0,0,0,.5)",fontSize:13,marginTop:8}}>¿Quién está vendiendo hoy?</p>
      </div>
      <div style={{width:"100%",maxWidth:400,display:"flex",flexDirection:"column",gap:10,position:"relative",zIndex:1}}>
        {Object.values(ROLES).map((r,i)=>(
          <button key={r.key} onClick={()=>setSel(r.key)} className="hap" style={{background:"#fff",border:`1.5px solid ${sel===r.key?r.accent:"rgba(0,0,0,.08)"}`,borderRadius:22,padding:"17px 20px",display:"flex",alignItems:"center",gap:14,textAlign:"left",animation:`fadeUp .5s ${.1+i*.08}s both`,transition:"all .3s cubic-bezier(.34,1.2,.64,1)",boxShadow:sel===r.key?`0 8px 24px ${r.accent}20`:"0 4px 12px rgba(0,0,0,.02)"}}>
            <div style={{width:50,height:50,borderRadius:16,background:sel===r.key?r.grad:"rgba(0,0,0,.04)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,transition:"all .3s"}}>{r.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:15,color:sel===r.key?r.accent:"#111"}}>{r.label}</div>
              <div style={{fontSize:12,color:"rgba(0,0,0,.5)",marginTop:3}}>{r.sub}</div>
            </div>
            {sel===r.key&&<div style={{width:22,height:22,borderRadius:50,background:r.grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",animation:"bounceIn .3s both"}}>✓</div>}
          </button>
        ))}
      </div>
      <button onClick={()=>sel&&onLogin(sel)} className="hap" style={{marginTop:24,width:"100%",maxWidth:400,padding:"16px",background:sel?ROLES[sel].grad:"#fff",color:sel?"#fff":"rgba(0,0,0,.3)",border:sel?"none":"1px solid rgba(0,0,0,.08)",borderRadius:20,fontSize:16,fontWeight:700,cursor:sel?"pointer":"not-allowed",animation:"fadeUp .6s .3s both",position:"relative",zIndex:1,transition:"all .3s",boxShadow:sel?`0 12px 32px ${ROLES[sel].accent}40`:"none"}}>
        {sel?`Entrar como ${ROLES[sel].label} →`:"Seleccioná tu perfil"}
      </button>
    </div>
  );
}

/* ── VENTA ── */
function Venta({role,productos,recargarProductos,orders,setOrders,transfers,setTransfers,toast}){
  const channel=role==="tienda"?"tienda":"live";
  const stockKey=channel==="tienda"?"stockTienda":"stockLive";
  const otherKey=channel==="tienda"?"stockLive":"stockTienda";
  const otherName=channel==="tienda"?"Live":"Tienda";
  const accent=ROLES[role].accent;
  const isLive=channel==="live";
  const cats=[...new Set(productos.filter(p=>p.active).map(p=>p.cat))];
  const [saleType,setSaleType]=useState("unidad");
  const [search,setSearch]=useState("");
  const [catFilter,setCatFilter]=useState(null);
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [clientOpen,setClientOpen]=useState(false);
  const [client,setClient]=useState({name:"",phone:""});
  const [notes,setNotes]=useState("");
  const [internalNote,setInternalNote]=useState("");
  const [discountPct,setDiscountPct]=useState(0);
  const [procesando,setProcesando]=useState(false);
  const [done,setDone]=useState(null);

  const getPrice=p=>calcPrice(p,channel,saleType);
  const filtered=useMemo(()=>productos.filter(p=>p.active&&(!catFilter||p.cat===catFilter)&&(!search||p.name.toLowerCase().includes(search.toLowerCase()))),
    [productos,catFilter,search]);
  const add=p=>setCart(prev=>{
    const ex=prev.find(c=>c.pid===p.id&&c.type===saleType);
    if(ex) return prev.map(c=>c.pid===p.id&&c.type===saleType?{...c,qty:c.qty+1}:c);
    return [...prev,{pid:p.id,type:saleType,qty:1}];
  });
  const setQty=(pid,type,qty)=>qty<1?setCart(prev=>prev.filter(c=>!(c.pid===pid&&c.type===type))):setCart(prev=>prev.map(c=>c.pid===pid&&c.type===type?{...c,qty}:c));
  const subtotal=cart.reduce((s,c)=>{const p=productos.find(x=>x.id===c.pid);return s+(p?getPrice(p)*c.qty:0);},0);
  const total=applyDisc(subtotal,discountPct);
  const totalItems=cart.reduce((s,c)=>s+c.qty,0);
  const openCart=()=>{if(isLive&&!client.name){setClientOpen(true);return;}setCartOpen(true);};

  const confirm=()=>{
    setProcesando(true);
    const oid=channel==="tienda"?`TDA-${uid()}`:`LIVE-${uid()}`;
    const alerts=[];
    const newTransf=[...transfers];
    cart.forEach(c=>{
      const p=productos.find(x=>x.id===c.pid); if(!p) return;
      const needed=calcUnits(p,c.type,c.qty);
      const avail=p[stockKey];
      if(avail<needed){
        const falta=needed-avail;
        const tid=`TRF-${uid()}`;
        alerts.push({pid:c.pid,name:p.name,falta,otherName,tid});
        newTransf.push({id:tid,pid:c.pid,productName:p.name,productIcon:p.icon,productPhoto:p.photo,unidades:falta,de:otherName.toLowerCase(),deKey:otherKey,a:channel,orderId:oid,status:"pendiente",createdAt:new Date()});
      }
    });
    const venta={
      order_id:oid,
      seller:role==="tienda"?"Cajero Tienda":client.name||"Vendedor Live",
      client:isLive?client.name:"Cliente Mostrador",
      phone:isLive?client.phone:"",
      channel,subtotal,discount_pct:discountPct,total,
      notes:notes||"Venta desde Balespi PRO",
      internal_note: internalNote,
      items:cart.map(c=>{
        const p=productos.find(x=>x.id===c.pid);
        return{product_id:c.pid,sale_type:c.type,qty:c.qty,price_applied:p?getPrice(p):0};
      }),
    };
    fetch(`${API_URL}/registrar_venta`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(venta)})
    .then(r=>r.json())
    .then(data=>{
      setProcesando(false);
      if(data.estado==="exito"){
        const order={id:oid,seller:role,client:isLive?client.name:"— Tienda —",phone:isLive?client.phone:"",channel,notes,internalNote,discount:discountPct,
          items:cart.map(c=>{const p=productos.find(x=>x.id===c.pid);return{pid:c.pid,qty:c.qty,type:c.type,units:calcUnits(p,c.type,c.qty),price:p?getPrice(p):0};}),
          subtotal,total,status:isLive?"pago_pendiente":"verificado",createdAt:new Date(),stockAlert:alerts.length>0?alerts:null};
        setOrders(prev=>[order,...prev]);
        setTransfers(newTransf);
        setDone({...order,total});
        setCart([]);setCartOpen(false);setClient({name:"",phone:""});setNotes("");setInternalNote("");setDiscountPct(0);
        recargarProductos();
        if(alerts.length>0) toast("warn",`🔀 ${alerts.length} traspaso(s) pendiente(s)`);
      } else {
        toast("err",`⛔ ${data.detalle||"Error en BD"}`);
      }
    })
    .catch(err=>{setProcesando(false);toast("err",`❌ Error de red`);});
  };

  if(done) return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:32,textAlign:"center",overflowY:"auto"}}>
      <div style={{fontSize:72,animation:"bounceIn .6s cubic-bezier(.34,1.56,.64,1) both"}}>{isLive?"📱":"✅"}</div>
      <div style={{animation:"fadeUp .4s .15s both",width:"100%",maxWidth:380}}>
        <h2 style={{fontSize:26,fontWeight:900,marginBottom:4,color:"#111"}}>{isLive?"¡Pedido creado!":"¡Venta registrada!"}</h2>
        {isLive&&<div style={{color:"rgba(0,0,0,.6)",fontSize:13,marginBottom:4}}>{done.client} · {done.phone}</div>}
        {done.discount>0&&<div style={{color:"#f43f5e",fontSize:12,fontWeight:700,marginBottom:6}}>🎉 -{done.discount}% · ahorraste {f(done.subtotal-done.total)}</div>}
        <div style={{fontSize:44,fontWeight:900,color:accent,letterSpacing:-2}}>{f(done.total)}</div>
        <div style={{fontSize:11,color:"rgba(0,0,0,.4)",marginTop:4,fontFamily:"monospace"}}>{done.id}</div>
        {done.stockAlert&&done.stockAlert.map((a,i)=>(
          <div key={i} style={{marginTop:12,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.3)",borderRadius:18,padding:"14px 16px",textAlign:"left"}}>
            <div style={{fontWeight:800,fontSize:13,color:"#d97706",marginBottom:6}}>🔀 Traspaso pendiente generado</div>
            <div style={{fontSize:12,color:"rgba(0,0,0,.7)",lineHeight:1.8}}><b style={{color:"#111"}}>{a.name}</b>: faltaron <b style={{color:"#d97706"}}>{a.falta}u</b> · <span style={{fontFamily:"monospace",fontSize:10,color:"rgba(0,0,0,.4)"}}>{a.tid}</span></div>
          </div>
        ))}
      </div>
      <button onClick={()=>setDone(null)} className="hap" style={{background:ROLES[role].grad,color:"#fff",border:"none",borderRadius:20,padding:"15px 40px",fontSize:16,fontWeight:800,boxShadow:`0 12px 40px ${accent}40`}}>Nueva Venta</button>
    </div>
  );

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"14px 16px 0",background:"rgba(255,255,255,.8)",backdropFilter:"blur(20px)",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:11,color:"rgba(0,0,0,.5)",letterSpacing:1.5,fontWeight:600}}>{channel==="tienda"?"🏪 VENTA EN TIENDA":"📱 VENTA LIVE / WHATSAPP"}</div>
            <h2 style={{fontSize:20,fontWeight:900,letterSpacing:-0.5,marginTop:2,color:"#111"}}>{isLive&&client.name?`Hola, ${client.name.split(" ")[0]} 👋`:"¿Qué vas a vender?"}</h2>
          </div>
          {isLive&&<button onClick={()=>setClientOpen(true)} className="hap" style={{background:client.name?`${accent}15`:"#fff",border:`1px solid ${client.name?accent+"40":"rgba(0,0,0,.1)"}`,borderRadius:14,padding:"8px 14px",color:client.name?accent:"rgba(0,0,0,.6)",fontSize:12,fontWeight:700,flexShrink:0}}>{client.name?"📱 "+client.phone.slice(-4):"+ Cliente"}</button>}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[{k:"unidad",e:"1️⃣",l:"Unidad"},{k:"docena",e:"📦",l:"Docena"},{k:"cajon",e:"🚛",l:"Cajón"}].map(t=>{
            const on=saleType===t.k;
            return(<button key={t.k} onClick={()=>setSaleType(t.k)} className="hap" style={{flex:1,background:on?ROLES[role].grad:"#fff",border:`1px solid ${on?"transparent":"rgba(0,0,0,.08)"}`,borderRadius:14,padding:"10px 4px",transition:"all .25s",boxShadow:on?`0 6px 20px ${accent}30`:"0 2px 6px rgba(0,0,0,.02)"}}>
              <div style={{fontSize:18,marginBottom:2}}>{t.e}</div>
              <div style={{fontSize:11,fontWeight:on?800:600,color:on?"#fff":"rgba(0,0,0,.6)"}}>{t.l}</div>
            </button>);
          })}
        </div>
        <SearchBar value={search} onChange={setSearch} placeholder="Buscar producto..."/>
        <CatChips cats={cats} active={catFilter} onChange={setCatFilter} accent={accent}/>
      </div>
      <div className="prod-grid-scroll" style={{flex:1,overflowY:"auto",padding:"4px 14px 120px"}}>
        {filtered.length===0&&<div style={{textAlign:"center",color:"rgba(0,0,0,.4)",padding:"50px 0"}}><div style={{fontSize:36,marginBottom:10,opacity:.3}}>🔍</div>Sin resultados</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:10}}>
          {filtered.map(p=>{
            const price=getPrice(p);
            const basePrice=channel==="tienda"?p.prices.tienda:p.prices.live;
            const item=cart.find(c=>c.pid===p.id&&c.type===saleType);
            const qty=item?.qty||0;
            const stockCanal=p[stockKey];
            const sinStock=stockCanal<=0;
            const stockBajo=stockCanal>0&&stockCanal<=p.stockMin;
            const insuf=qty>0&&calcUnits(p,saleType,qty)>stockCanal;
            return(
              <div key={p.id} style={{background:insuf?"linear-gradient(145deg,rgba(245,158,11,.1),rgba(245,158,11,.02))":qty>0?`linear-gradient(145deg,${accent}10,${accent}02)`:"#fff",border:`1.5px solid ${insuf?"#f59e0b55":qty>0?accent+"55":"rgba(0,0,0,.06)"}`,borderRadius:22,overflow:"hidden",transition:"all .3s",position:"relative",opacity:sinStock?.45:1,boxShadow:"0 4px 16px rgba(0,0,0,.02)"}}>
                <div style={{position:"absolute",top:9,right:9,background:sinStock?"rgba(239,68,68,.15)":stockBajo?"rgba(245,158,11,.15)":"rgba(0,0,0,.05)",border:`1px solid ${sinStock?"rgba(239,68,68,.3)":stockBajo?"rgba(245,158,11,.3)":"rgba(0,0,0,.05)"}`,borderRadius:8,padding:"3px 8px",fontSize:9,fontWeight:800,color:sinStock?"#dc2626":stockBajo?"#d97706":"rgba(0,0,0,.5)"}}>
                  {sinStock?"AGOTADO":`${stockCanal}u`}
                </div>
                {p.promo&&<div style={{position:"absolute",top:9,left:9,background:"linear-gradient(135deg,#f43f5e,#f59e0b)",borderRadius:8,padding:"2px 8px",fontSize:9,fontWeight:900,color:"#fff"}}>🔥 {p.promo.label}</div>}
                <div style={{padding:"20px 14px 10px"}}>
                  {p.photo?<div style={{width:60,height:60,borderRadius:14,overflow:"hidden",margin:"0 auto 8px",border:"1px solid rgba(0,0,0,.05)",background:"#f8f9fa"}}><img src={p.photo} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                  :<div style={{fontSize:40,textAlign:"center",marginBottom:8}}>{p.icon}</div>}
                  <div style={{fontWeight:700,fontSize:13,textAlign:"center",lineHeight:1.3,marginBottom:6,color:"#111"}}>{p.name}</div>
                  <div style={{textAlign:"center"}}>
                    {p.promo&&saleType==="unidad"&&<div style={{fontSize:11,color:"rgba(0,0,0,.4)",textDecoration:"line-through",marginBottom:2}}>{f(basePrice)}</div>}
                    <span style={{fontSize:25,fontWeight:900,letterSpacing:-1,color:insuf?"#d97706":qty>0?accent:"#111"}}>{f(price)}</span>
                  </div>
                  <div style={{textAlign:"center",fontSize:10,color:"rgba(0,0,0,.4)",marginTop:2}}>{saleType==="unidad"?"por unidad":saleType==="docena"?`docena·${p.perDozen}u`:`cajón·${p.perBox}u`}</div>
                  {insuf&&<div style={{marginTop:6,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.2)",borderRadius:10,padding:"4px 8px",textAlign:"center",fontSize:9,fontWeight:700,color:"#d97706"}}>solo {stockCanal}u · traspaso</div>}
                </div>
                <div style={{padding:"0 10px 12px"}}>
                  {qty===0?(
                    <button onClick={()=>!sinStock&&add(p)} className="hap" style={{width:"100%",background:sinStock?"#f4f5f8":"rgba(0,0,0,.03)",border:`1px solid ${sinStock?"rgba(0,0,0,.03)":"rgba(0,0,0,.06)"}`,borderRadius:12,padding:"12px",color:sinStock?"rgba(0,0,0,.3)":"rgba(0,0,0,.8)",fontSize:14,fontWeight:700,cursor:sinStock?"not-allowed":"pointer"}}>
                      {sinStock?"Sin stock":"+ Agregar"}
                    </button>
                  ):(
                    <div style={{display:"flex",alignItems:"center",background:"#fff",borderRadius:12,border:`1px solid ${insuf?"#f59e0b50":accent+"50"}`,overflow:"hidden",boxShadow:`0 4px 12px ${accent}15`}}>
                      <button onClick={()=>setQty(p.id,saleType,qty-1)} className="hap" style={{flex:1,background:"none",border:"none",padding:"12px",color:"rgba(0,0,0,.6)",fontSize:22,fontWeight:300}}>−</button>
                      <div style={{flex:1,textAlign:"center",fontWeight:900,fontSize:20,color:insuf?"#d97706":accent,borderLeft:`1px solid ${insuf?"#f59e0b30":accent+"30"}`,borderRight:`1px solid ${insuf?"#f59e0b30":accent+"30"}`,padding:"12px 4px",background:"rgba(0,0,0,.01)"}}>{qty}</div>
                      <button onClick={()=>setQty(p.id,saleType,qty+1)} className="hap" style={{flex:1,background:"none",border:"none",padding:"12px",color:accent,fontSize:22,fontWeight:700}}>+</button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {cart.length>0&&(
        <div className="cart-float">
          <button onClick={openCart} className="hap" style={{width:"100%",background:ROLES[role].grad,border:"none",borderRadius:22,padding:"17px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:`0 16px 48px ${accent}40`}}>
            <div style={{background:"rgba(255,255,255,.25)",borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:17,color:"#fff"}}>{totalItems}</div>
            <div style={{textAlign:"center",flex:1}}><div style={{fontWeight:800,fontSize:16,color:"#fff"}}>Ver pedido</div><div style={{fontSize:12,color:"rgba(255,255,255,.8)",marginTop:1}}>{cart.length} producto{cart.length>1?"s":""}</div></div>
            <div style={{fontWeight:900,fontSize:18,color:"#fff",letterSpacing:-0.5}}>{f(total)}</div>
          </button>
        </div>
      )}
      <Sheet open={clientOpen} onClose={()=>setClientOpen(false)} title="Datos del cliente">
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <GInput label="Nombre completo" value={client.name} onChange={v=>setClient({...client,name:v})} placeholder="Ej: María López" icon="👤"/>
          <GInput label="WhatsApp" value={client.phone} onChange={v=>setClient({...client,phone:v})} placeholder="987 654 321" type="tel" icon="📱"/>
          <GInput label="Notas" value={notes} onChange={setNotes} placeholder="Dirección, referencia..." icon="📝"/>
          <button onClick={()=>{if(client.name&&client.phone){setClientOpen(false);if(cart.length>0)setCartOpen(true);}}} className="hap" style={{background:client.name&&client.phone?ROLES[role].grad:"rgba(0,0,0,.05)",color:client.name&&client.phone?"#fff":"rgba(0,0,0,.3)",border:"none",borderRadius:18,padding:"16px",fontSize:15,fontWeight:700,cursor:client.name&&client.phone?"pointer":"not-allowed",boxShadow:client.name&&client.phone?`0 8px 24px ${accent}30`:"none"}}>Listo →</button>
        </div>
      </Sheet>
      <Sheet open={cartOpen} onClose={()=>setCartOpen(false)} title="Tu pedido">
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {isLive&&client.name&&(
            <div style={{background:`${accent}08`,border:`1px solid ${accent}25`,borderRadius:16,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontWeight:700,fontSize:14,color:"#111"}}>{client.name}</div><div style={{color:accent,fontSize:12,marginTop:2}}>📞 {client.phone}</div></div>
              <button onClick={()=>{setCartOpen(false);setClientOpen(true);}} style={{background:"#fff",border:"1px solid rgba(0,0,0,.1)",borderRadius:10,padding:"6px 12px",color:"rgba(0,0,0,.6)",fontSize:12,fontWeight:600}}>Editar</button>
            </div>
          )}
          {cart.map(c=>{
            const p=productos.find(x=>x.id===c.pid); if(!p) return null;
            const price=getPrice(p);
            const units=calcUnits(p,c.type,c.qty);
            const insuf=units>p[stockKey];
            return(
              <div key={`${c.pid}-${c.type}`} style={{background:"#fff",border:`1px solid ${insuf?"rgba(245,158,11,.3)":"rgba(0,0,0,.08)"}`,borderRadius:20,padding:16,boxShadow:"0 4px 12px rgba(0,0,0,.02)"}}>
                <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
                  <span style={{fontSize:26}}>{p.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:"#111"}}>{p.name}</div>
                    <div style={{fontSize:11,color:"rgba(0,0,0,.5)",marginTop:2}}>{c.type==="unidad"?"unidad":c.type==="docena"?`docena (${p.perDozen}u)`:`cajón (${p.perBox}u)`} · {f(price)} · <b style={{color:insuf?"#d97706":"rgba(0,0,0,.7)"}}>{units}u</b></div>
                    {insuf&&<div style={{fontSize:10,color:"#d97706",fontWeight:700,marginTop:3}}>⚠ Solo {p[stockKey]}u → traspaso desde {otherName}</div>}
                  </div>
                  <button onClick={()=>setQty(c.pid,c.type,0)} className="hap" style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",borderRadius:9,padding:"5px 10px",color:"#dc2626",fontSize:11,fontWeight:700}}>Quitar</button>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{display:"flex",alignItems:"center",background:"#f8f9fa",borderRadius:12,border:"1px solid rgba(0,0,0,.08)",overflow:"hidden"}}>
                    <button onClick={()=>setQty(c.pid,c.type,c.qty-1)} className="hap" style={{background:"none",border:"none",padding:"10px 16px",color:"rgba(0,0,0,.6)",fontSize:20,fontWeight:300}}>−</button>
                    <span style={{fontWeight:800,fontSize:18,padding:"0 4px",minWidth:28,textAlign:"center",color:"#111"}}>{c.qty}</span>
                    <button onClick={()=>setQty(c.pid,c.type,c.qty+1)} className="hap" style={{background:"none",border:"none",padding:"10px 16px",color:accent,fontSize:20,fontWeight:700}}>+</button>
                  </div>
                  <div style={{flex:1,textAlign:"right"}}><div style={{fontSize:10,color:"rgba(0,0,0,.4)"}}>subtotal</div><div style={{fontWeight:900,fontSize:22,color:accent,letterSpacing:-0.5}}>{f(price*c.qty)}</div></div>
                </div>
              </div>
            );
          })}
          <div style={{background:"rgba(244,63,94,.05)",border:"1px solid rgba(244,63,94,.15)",borderRadius:20,padding:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"#e11d48",letterSpacing:1,marginBottom:12}}>🎉 DESCUENTO ADICIONAL</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[0,5,10,15,20].map(pct=>(
                <button key={pct} onClick={()=>setDiscountPct(pct)} className="hap" style={{background:discountPct===pct?"#f43f5e":"#fff",border:`1px solid ${discountPct===pct?"#f43f5e":"rgba(0,0,0,.1)"}`,borderRadius:12,padding:"9px 14px",color:discountPct===pct?"#fff":"rgba(0,0,0,.6)",fontSize:13,fontWeight:700,transition:"all .2s"}}>
                  {pct===0?"Sin desc.":`${pct}%`}
                </button>
              ))}
            </div>
          </div>
          <div style={{background:"rgba(99,108,241,.05)",border:"1px solid rgba(99,108,241,.15)",borderRadius:20,padding:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"#4f46e5",letterSpacing:1,marginBottom:10}}>🔒 NOTA INTERNA</div>
            <GTextarea value={internalNote} onChange={setInternalNote} placeholder="Solo visible para el equipo..." rows={2}/>
          </div>
          <div style={{background:"#f8f9fa",border:"1px solid rgba(0,0,0,.08)",borderRadius:20,padding:"16px 18px"}}>
            {discountPct>0&&<><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:"rgba(0,0,0,.5)"}}>Subtotal</span><span style={{fontSize:13,color:"rgba(0,0,0,.5)",textDecoration:"line-through"}}>{f(subtotal)}</span></div><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,color:"#e11d48",fontWeight:700}}>Descuento {discountPct}%</span><span style={{fontSize:13,color:"#e11d48",fontWeight:700}}>-{f(subtotal-total)}</span></div></>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:12,color:"rgba(0,0,0,.5)"}}>TOTAL</div><div style={{fontSize:11,color:"rgba(0,0,0,.4)",marginTop:1}}>{totalItems} uds · {channel}</div></div>
              <div style={{fontSize:34,fontWeight:900,color:accent,letterSpacing:-1}}>{f(total)}</div>
            </div>
          </div>
          <button onClick={confirm} disabled={procesando} className="hap" style={{background:procesando?"rgba(245,158,11,.2)":ROLES[role].grad,color:procesando?"#d97706":"#fff",border:"none",borderRadius:20,padding:"18px",fontSize:17,fontWeight:800,cursor:procesando?"not-allowed":"pointer",boxShadow:procesando?"none":`0 12px 32px ${accent}40`,display:"flex",alignItems:"center",justifyContent:"center",gap:10,transition:"all .3s"}}>
            {procesando?(<><div style={{width:20,height:20,border:"2px solid rgba(217,119,6,.3)",borderTop:"2px solid #d97706",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>Procesando en BD…</>):(`Confirmar · ${f(total)}`)}
          </button>
        </div>
      </Sheet>
    </div>
  );
}

/* ── PEDIDOS ── */
function Pedidos({orders,setOrders,productos,accent,role,toast}){
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [sel,setSel]=useState(null);
  const [editNote,setEditNote]=useState("");
  const filtered=orders.filter(o=>{
    const mF=filter==="all"||(filter==="pending"&&["pago_pendiente","pago_recibido"].includes(o.status))||(filter==="active"&&["verificado","embalando"].includes(o.status))||(filter==="sent"&&["enviado","entregado"].includes(o.status))||(o.channel===filter);
    const mS=!search||o.client.toLowerCase().includes(search.toLowerCase())||o.id.toLowerCase().includes(search.toLowerCase());
    return mF&&mS;
  });
  const advance=o=>{
    const idx=FLOW.indexOf(o.status);
    if(idx<FLOW.length-1){const ns=FLOW[idx+1];setOrders(prev=>prev.map(x=>x.id===o.id?{...x,status:ns}:x));setSel(s=>s?{...s,status:ns}:s);toast("ok",`${o.id} → ${STATUS_MAP[ns].label}`);}
  };
  return(
    <div style={{height:"100%",overflowY:"auto",padding:16}}>
      <SearchBar value={search} onChange={setSearch} placeholder="Buscar cliente o ID..."/>
      <div style={{display:"flex",gap:8,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
        {[{k:"all",l:"Todos"},{k:"pending",l:"Pendientes"},{k:"active",l:"Activos"},{k:"sent",l:"Enviados"},{k:"tienda",l:"Tienda"},{k:"live",l:"Live"}].map(fi=>(
          <button key={fi.k} onClick={()=>setFilter(fi.k)} className="hap" style={{background:filter===fi.k?`${accent}15`:"#fff",border:`1px solid ${filter===fi.k?accent+"50":"rgba(0,0,0,.08)"}`,borderRadius:50,padding:"8px 16px",color:filter===fi.k?accent:"rgba(0,0,0,.6)",fontSize:12,fontWeight:600,whiteSpace:"nowrap",transition:"all .2s"}}>{fi.l}</button>
        ))}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",color:"rgba(0,0,0,.3)",padding:"50px 0"}}><div style={{fontSize:36,marginBottom:10,opacity:.3}}>📋</div>Sin resultados</div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(o=>(
          <button key={o.id} onClick={()=>{setSel(o);setEditNote(o.internalNote||"");}} className="hap" style={{background:"#fff",border:`1px solid ${o.stockAlert?"rgba(245,158,11,.4)":o.internalNote?"rgba(99,108,241,.3)":"rgba(0,0,0,.08)"}`,borderRadius:20,padding:16,textAlign:"left",width:"100%",transition:"all .2s",boxShadow:"0 4px 12px rgba(0,0,0,.02)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15,marginBottom:6,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",color:"#111"}}>
                  {o.channel==="live"?"📱":"🏪"} {o.client}
                  {o.stockAlert&&<span style={{fontSize:10,color:"#d97706",background:"rgba(245,158,11,.15)",padding:"2px 7px",borderRadius:6,fontWeight:700}}>🔀 traspaso</span>}
                  {o.internalNote&&<span style={{fontSize:10,color:"#4f46e5",background:"rgba(99,108,241,.15)",padding:"2px 7px",borderRadius:6}}>nota</span>}
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  <Pill status={o.status}/>

              <GTextarea value={editNote} onChange={setEditNote} placeholder="Solo el equipo puede ver esto..." rows={2}/>
              <button onClick={()=>{setOrders(prev=>prev.map(x=>x.id===sel.id?{...x,internalNote:editNote}:x));setSel(s=>({...s,internalNote:editNote}));toast("ok","🔒 Nota guardada");}} className="hap" style={{marginTop:10,background:"rgba(99,108,241,.1)",border:"1px solid rgba(99,108,241,.2)",borderRadius:12,padding:"9px 18px",color:"#4f46e5",fontSize:13,fontWeight:700}}>Guardar nota</button>
            </div>

          </div>
        )}
      </Sheet>
    </div>
  );
}

/* ── TRASPASOS ── */
function Traspasos({transfers,setTransfers,productos,setProductos,role,toast}){
  const accent=ROLES[role].accent;
  const pending=transfers.filter(t=>t.status==="pendiente");
  const history=transfers.filter(t=>t.status!=="pendiente");
  const confirmTrf=t=>{
    const p=productos.find(x=>x.id===t.pid);if(!p)return;
    const avail=p[t.deKey];
    if(avail<t.unidades){toast("err",`❌ Solo ${avail}u en ${t.de}`);return;}
    setProductos(prev=>prev.map(x=>x.id!==t.pid?x:{...x,[t.deKey]:x[t.deKey]-t.unidades}));
    setTransfers(prev=>prev.map(x=>x.id===t.id?{...x,status:"confirmado",confirmedAt:new Date(),confirmedBy:role}:x));
    toast("ok",`✅ Traspaso confirmado · ${t.unidades}u`);
  };
  const cancelTrf=t=>{setTransfers(prev=>prev.map(x=>x.id===t.id?{...x,status:"cancelado"}:x));toast("warn",`❌ Traspaso cancelado`);};
  return(
    <div style={{height:"100%",overflowY:"auto",padding:16}}>
      <div style={{fontWeight:800,fontSize:18,marginBottom:4,color:"#111"}}>🔀 Traspasos de Stock</div>
      <div style={{fontSize:12,color:"rgba(0,0,0,.5)",marginBottom:16}}>Confirmar como <b style={{color:accent}}>{ROLES[role].label}</b></div>
      {pending.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:"rgba(0,0,0,.4)"}}><div style={{fontSize:52,marginBottom:12,opacity:.3}}>✅</div><div style={{fontSize:15,fontWeight:600}}>Sin traspasos pendientes</div></div>}
      {pending.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:22}}>
          <div style={{fontSize:11,color:"#d97706",fontWeight:700,letterSpacing:1.5,marginBottom:6}}>⚠ PENDIENTES</div>
          {pending.map(t=>{
            const p=productos.find(x=>x.id===t.pid);
            const stockOrigen=p?p[t.deKey]:0;
            const hayStock=stockOrigen>=t.unidades;
            return(
              <div key={t.id} style={{background:"rgba(245,158,11,.05)",border:"1px solid rgba(245,158,11,.2)",borderRadius:22,padding:18}}>
                <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:14}}>
                  <div style={{width:52,height:52,borderRadius:16,background:"#fff",border:"1px solid rgba(0,0,0,.05)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden"}}>
                    {t.productPhoto?<img src={t.productPhoto} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:26}}>{t.productIcon}</span>}
                  </div>
                  <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15,marginBottom:3,color:"#111"}}>{t.productName}</div><div style={{fontSize:11,color:"rgba(0,0,0,.5)"}}>Pedido: <span style={{fontFamily:"monospace",color:"rgba(0,0,0,.7)"}}>{t.orderId}</span></div></div>
                  <div style={{textAlign:"right",flexShrink:0}}><div style={{fontWeight:900,fontSize:28,color:"#d97706",letterSpacing:-1}}>{t.unidades}</div><div style={{fontSize:10,color:"rgba(0,0,0,.4)"}}>unidades</div></div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10,background:"#fff",border:"1px solid rgba(0,0,0,.08)",borderRadius:14,padding:"10px 16px",marginBottom:12}}>
                  <span style={{fontWeight:700,fontSize:13,color:"#111"}}>{t.de==="tienda"?"🏪 Tienda":"📱 Live"}</span>
                  <div style={{flex:1,height:2,background:"rgba(245,158,11,.3)",position:"relative"}}><div style={{position:"absolute",right:-6,top:-7,color:"#f59e0b",fontSize:14}}>▶</div></div>
                  <span style={{fontWeight:700,fontSize:13,color:"#111"}}>{t.a==="tienda"?"🏪 Tienda":"📱 Live"}</span>
                </div>
                <div style={{fontSize:12,marginBottom:14,fontWeight:hayStock?400:700,color:hayStock?"rgba(0,0,0,.6)":"#dc2626"}}>{hayStock?`✓ Disponibles: ${stockOrigen}u`:`⚠ Solo ${stockOrigen}u disponibles`}</div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>cancelTrf(t)} className="hap" style={{flex:1,background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:14,padding:"12px",color:"#dc2626",fontSize:13,fontWeight:700}}>✕ Cancelar</button>
                  <button onClick={()=>confirmTrf(t)} disabled={!hayStock} className="hap" style={{flex:2,background:hayStock?"linear-gradient(135deg,#10b981,#059669)":"rgba(0,0,0,.05)",color:hayStock?"#fff":"rgba(0,0,0,.3)",border:"none",borderRadius:14,padding:"12px",fontSize:14,fontWeight:800,cursor:hayStock?"pointer":"not-allowed",boxShadow:hayStock?"0 8px 24px rgba(16,185,129,.3)":"none"}}>✓ Confirmar</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {history.length>0&&(
        <><div style={{fontSize:11,color:"rgba(0,0,0,.4)",fontWeight:700,letterSpacing:1.5,marginBottom:10}}>HISTORIAL</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {history.map(t=>(
            <div key={t.id} style={{background:"#fff",border:"1px solid rgba(0,0,0,.08)",borderRadius:18,padding:"14px 16px",display:"flex",gap:12,alignItems:"center",boxShadow:"0 2px 8px rgba(0,0,0,.02)"}}>
              <span style={{fontSize:22,opacity:.8}}>{t.productIcon||"📦"}</span>
              <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,color:"#111"}}>{t.productName}</div><div style={{fontSize:11,color:"rgba(0,0,0,.5)",marginTop:2}}>{t.de==="tienda"?"🏪":"📱"} → {t.a==="tienda"?"🏪":"📱"} · {t.unidades}u · {ago(t.createdAt)}</div></div>
              <span style={{background:t.status==="confirmado"?"rgba(16,185,129,.1)":"rgba(239,68,68,.1)",color:t.status==="confirmado"?"#059669":"#dc2626",border:`1px solid ${t.status==="confirmado"?"rgba(16,185,129,.2)":"rgba(239,68,68,.2)"}`,borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:700}}>{t.status==="confirmado"?"✓ Ok":"✕ Cancel."}</span>
            </div>
          ))}
        </div></>
      )}
    </div>
  );
}
