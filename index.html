function ProductosScreen({productos,setProductos,role,toast,recargarProductos}){
  const accent=ROLES[role].accent;
  const allCats= useMemo(() => productos ? [...new Set(productos.map(p=>p.cat).filter(Boolean))] : [], [productos]);
  const [search,setSearch]=useState("");
  const [catFilter,setCatFilter]=useState(null);
  const [stockP,setStockP]=useState(null);
  const [stockMode,setStockMode]=useState("tienda");
  const [delta,setDelta]=useState("");
  const [editP,setEditP]=useState(null);
  const [vista,setVista]=useState("grid");

  const filtered=useMemo(() => (productos || []).filter(p=>
    (!catFilter||p.cat===catFilter)&&
    (!search||p.name.toLowerCase().includes(search.toLowerCase())||(p.sku||"").toLowerCase().includes(search.toLowerCase()))
  ),[productos,catFilter,search]);

  // AHORA SÍ CONECTA AL BACKEND PYTHON EN VEZ DE SOLO MEMORIA LOCAL
  const adjustStock=(p,d)=>{
    const n=Math.max(0,Number(d));if(n<=0){toast("err","Ingresá un número mayor a 0");return;}
    
    const newTienda = stockMode === "tienda" || stockMode === "ambos" ? (p.stockTienda || 0) + n : p.stockTienda || 0;
    const newLive = stockMode === "live" || stockMode === "ambos" ? (p.stockLive || 0) + n : p.stockLive || 0;

    fetch(`${API_URL}/actualizar_stock`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: p.id, stock_tienda: newTienda, stock_live: newLive })
    })
    .then(res => res.json())
    .then(data => {
      if(data.estado === "exito"){
        toast("ok", `📦 Stock actualizado persistido`);
        recargarProductos();
        setStockP(null); setDelta(""); setStockMode("tienda");
      } else {
        toast("err", `⛔ Error en BD: ${data.detalle}`);
      }
    });
  };

  // AHORA SÍ CONECTA AL BACKEND PYTHON AL CREAR/EDITAR
  const saveProduct=prod=>{
    fetch(`${API_URL}/crear_producto`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(prod)
    })
    .then(res => res.json())
    .then(data => {
      if(data.estado === "exito"){
        toast("ok", `✅ Producto guardado persistido`);
        recargarProductos();
        setEditP(null);
      } else {
        toast("err", `⛔ Error en BD: ${data.detalle}`);
      }
    });
  };

  const toggleActive=p=>{
    setProductos(prev=>prev.map(x=>x.id===p.id?{...x,active:!x.active}:x));
    toast(p.active?"warn":"ok",`${p.active?"⏸ Pausado":"▶ Activado"}: ${p.name}`);
  };

  return(
    <div style={{height:"100%",overflowY:"auto",padding:16}}>

      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,gap:10}}>
        <span style={{fontWeight:800,fontSize:18,color:"#111"}}>📦 Productos</span>
        <div style={{display:"flex",gap:8}}>
          <button onClick={recargarProductos} className="hap" style={{background:"#fff",border:"1px solid rgba(0,0,0,.1)",borderRadius:12,padding:"8px 12px",color:"rgba(0,0,0,.6)",fontSize:12,fontWeight:600}}>↻</button>
          <button onClick={()=>setVista(v=>v==="grid"?"lista":"grid")} className="hap" style={{background:"#fff",border:"1px solid rgba(0,0,0,.1)",borderRadius:12,padding:"8px 12px",color:"rgba(0,0,0,.6)",fontSize:14}}>
            {vista==="grid"?"☰":"⊞"}
          </button>
          <button onClick={()=>setEditP(EMPTY_PROD())} className="hap" style={{background:ROLES[role].grad,border:"none",borderRadius:12,padding:"8px 16px",color:"#fff",fontSize:13,fontWeight:700,boxShadow:`0 4px 16px ${accent}40`}}>+ Nuevo</button>
        </div>
      </div>

      <SearchBar value={search} onChange={setSearch} placeholder="Buscar nombre o SKU..."/>
      <CatChips cats={allCats} active={catFilter} onChange={setCatFilter} accent={accent}/>

      {/* RESUMEN */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
        {[
          {l:"Total",v:productos?.length || 0,c:"rgba(0,0,0,.6)"},
          {l:"Activos",v:(productos || []).filter(p=>p.active).length,c:"#10b981"},
          {l:"Stock bajo",v:(productos || []).filter(p=>p.active&&((p.stockTienda || 0)<=p.stockMin||(p.stockLive || 0)<=p.stockMin)).length,c:"#f59e0b"},
        ].map((s,i)=>(
          <div key={i} style={{background:"#fff",border:`1px solid ${s.c.replace('.6','.15')}`,borderRadius:14,padding:"10px 12px",textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,.02)"}}>
            <div style={{fontWeight:900,fontSize:22,color:s.c.replace('.6','1')}}>{s.v}</div>
            <div style={{fontSize:10,color:"rgba(0,0,0,.5)",marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* LISTA / GRID */}
      {vista==="grid"?(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
          {filtered.map(p=>{
            const stockTienda = p.stockTienda || 0;
            const stockLive = p.stockLive || 0;
            const lowT = stockTienda <= p.stockMin, lowL = stockLive <= p.stockMin;
            return(
              <div key={p.id} style={{background:"#fff",border:`1px solid ${(lowT||lowL)?"rgba(245,158,11,.3)":p.promo?"rgba(244,63,94,.2)":"rgba(0,0,0,.08)"}`,borderRadius:20,padding:14,opacity:p.active?1:.5,position:"relative",boxShadow:"0 4px 12px rgba(0,0,0,.02)"}}>
                {!p.active&&<div style={{position:"absolute",top:10,left:10,background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",borderRadius:8,padding:"2px 8px",fontSize:9,fontWeight:800,color:"#dc2626"}}>PAUSADO</div>}
                {p.promo&&p.active&&<div style={{position:"absolute",top:10,left:10,background:"linear-gradient(135deg,#f43f5e,#f59e0b)",borderRadius:8,padding:"2px 8px",fontSize:9,fontWeight:900,color:"#fff"}}>🔥 {p.promo.label}</div>}
                <div style={{textAlign:"center",paddingTop:p.promo||!p.active?16:0}}>
                  {p.photo?<div style={{width:56,height:56,borderRadius:14,overflow:"hidden",margin:"0 auto 8px",border:"1px solid rgba(0,0,0,.05)",background:"#f8f9fa"}}><img src={p.photo} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                  :<div style={{fontSize:38,marginBottom:8}}>{p.icon}</div>}
                  <div style={{fontWeight:700,fontSize:13,marginBottom:4,lineHeight:1.3,color:"#111"}}>{p.name}</div>
                  <div style={{fontSize:10,color:"rgba(0,0,0,.4)",fontFamily:"monospace",marginBottom:8}}>{p.sku}</div>
                  <div style={{fontWeight:900,fontSize:20,color:accent,letterSpacing:-0.5}}>{f(p.prices.tienda)}</div>
                  <div style={{fontSize:10,color:"rgba(0,0,0,.4)",marginBottom:8}}>tienda</div>
                  <StockGauge p={p}/>
                </div>
                <div style={{display:"flex",gap:6,marginTop:12}}>
                  <button onClick={()=>setEditP(p)} className="hap" style={{flex:1,background:"#f8f9fa",border:"1px solid rgba(0,0,0,.08)",borderRadius:10,padding:"8px 4px",color:"rgba(0,0,0,.7)",fontSize:12,fontWeight:600}}>✏️ Editar</button>
                  <button onClick={()=>{setStockP(p);setDelta("");setStockMode("tienda");}} className="hap" style={{flex:1,background:`${accent}10`,border:`1px solid ${accent}30`,borderRadius:10,padding:"8px 4px",color:accent,fontSize:12,fontWeight:700}}>📥 Stock</button>
                </div>
              </div>
            );
          })}
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(p=>{
            const stockTienda = p.stockTienda || 0;
            const stockLive = p.stockLive || 0;
            const lowT = stockTienda <= p.stockMin, lowL = stockLive <= p.stockMin;
            return(
              <div key={p.id} style={{background:"#fff",border:`1px solid ${(lowT||lowL)?"rgba(245,158,11,.3)":p.promo?"rgba(244,63,94,.2)":"rgba(0,0,0,.08)"}`,borderRadius:20,padding:14,opacity:p.active?1:.5,boxShadow:"0 2px 8px rgba(0,0,0,.02)"}}>
                <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:10}}>
                  <div style={{width:52,height:52,borderRadius:14,overflow:"hidden",flexShrink:0,background:"#f8f9fa",border:"1px solid rgba(0,0,0,.05)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {p.photo?<img src={p.photo} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:24}}>{p.icon}</span>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",color:"#111"}}>
                      {p.name}
                      {p.promo&&<span style={{background:"linear-gradient(135deg,#f43f5e,#f59e0b)",borderRadius:6,padding:"1px 7px",fontSize:9,fontWeight:900,color:"#fff"}}>🔥 {p.promo.label}</span>}
                      {!p.active&&<span style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",borderRadius:6,padding:"1px 7px",fontSize:9,fontWeight:800,color:"#dc2626"}}>PAUSADO</span>}
                    </div>
                    <div style={{fontSize:11,color:"rgba(0,0,0,.4)",fontFamily:"monospace",marginTop:2}}>{p.sku} · {p.cat}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontWeight:900,fontSize:18,color:accent}}>{f(p.prices.tienda)}</div>
                    <div style={{fontSize:10,color:"rgba(0,0,0,.5)"}}>📱 {f(p.prices.live)}</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:10}}>
                  {[{l:"🏪",v:p.prices.tienda},{l:"📱",v:p.prices.live},{l:"📦",v:p.prices.docena_unit},{l:"🚛",v:p.prices.cajon_unit}].map((ch,i)=>(
                    <div key={i} style={{background:"#f8f9fa",border:"1px solid rgba(0,0,0,.05)",borderRadius:10,padding:"6px 4px",textAlign:"center"}}><div style={{fontSize:11,marginBottom:2}}>{ch.l}</div><div style={{fontWeight:800,fontSize:11,color:"#111"}}>{f(ch.v)}</div></div>
                  ))}
                </div>
                <StockGauge p={p}/>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={()=>setEditP(p)} className="hap" style={{flex:1,background:"#f8f9fa",border:"1px solid rgba(0,0,0,.08)",borderRadius:12,padding:"9px 8px",color:"rgba(0,0,0,.7)",fontSize:12,fontWeight:600}}>✏️ Editar</button>
                  <button onClick={()=>{setStockP(p);setDelta("");setStockMode("tienda");}} className="hap" style={{flex:1,background:`${accent}10`,border:`1px solid ${accent}30`,borderRadius:12,padding:"9px 8px",color:accent,fontSize:12,fontWeight:700}}>📥 Stock</button>
                  <button onClick={()=>toggleActive(p)} className="hap" style={{flex:1,background:p.active?"rgba(239,68,68,.08)":"rgba(16,185,129,.08)",border:`1px solid ${p.active?"rgba(239,68,68,.2)":"rgba(16,185,129,.2)"}`,borderRadius:12,padding:"9px 8px",color:p.active?"#dc2626":"#059669",fontSize:12,fontWeight:700}}>{p.active?"⏸ Pausar":"▶ Activar"}</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* SHEET STOCK */}
      <Sheet open={!!stockP} onClose={()=>setStockP(null)} title={`📥 Ingresar Stock`}>
        {stockP&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"#fff",border:"1px solid rgba(0,0,0,.08)",borderRadius:20,padding:18,boxShadow:"0 2px 12px rgba(0,0,0,.03)"}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:12,color:"#111"}}>{stockP.icon} {stockP.name}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.2)",borderRadius:14,padding:12,textAlign:"center"}}><div style={{fontSize:11,color:"#d97706",fontWeight:600,marginBottom:4}}>🏪 TIENDA</div><div style={{fontSize:28,fontWeight:900,color:"#d97706"}}>{stockP.stockTienda || 0}</div></div>
                <div style={{background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.2)",borderRadius:14,padding:12,textAlign:"center"}}><div style={{fontSize:11,color:"#059669",fontWeight:600,marginBottom:4}}>📱 LIVE</div><div style={{fontSize:28,fontWeight:900,color:"#059669"}}>{stockP.stockLive || 0}</div></div>
              </div>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:"rgba(0,0,0,.5)",letterSpacing:1.2,textTransform:"uppercase",marginBottom:8}}>¿A qué canal ingresan?</div>
              <div style={{display:"flex",gap:8}}>
                {[{k:"tienda",l:"🏪 Tienda"},{k:"live",l:"📱 Live"},{k:"ambos",l:"🔀 Ambos"}].map(m=>(
                  <button key={m.k} onClick={()=>setStockMode(m.k)} className="hap" style={{flex:1,background:stockMode===m.k?`${accent}15`:"#fff",border:`1px solid ${stockMode===m.k?accent+"50":"rgba(0,0,0,.1)"}`,borderRadius:14,padding:"11px 4px",color:stockMode===m.k?accent:"rgba(0,0,0,.6)",fontSize:12,fontWeight:stockMode===m.k?700:500,transition:"all .2s"}}>{m.l}</button>
                ))}
              </div>
            </div>
            <GInput label="Unidades a ingresar" value={delta} onChange={setDelta} type="number" placeholder="Ej: 60"/>
            {delta&&Number(delta)>0&&<div style={{background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.2)",borderRadius:14,padding:14,fontSize:13,color:"#059669",fontWeight:600}}>
              {stockMode==="tienda"&&`🏪 Tienda: ${stockP.stockTienda || 0} → ${(stockP.stockTienda || 0)+Number(delta)}u`}
              {stockMode==="live"&&`📱 Live: ${stockP.stockLive || 0} → ${(stockP.stockLive || 0)+Number(delta)}u`}
              {stockMode==="ambos"&&`🏪 +${Number(delta)}u  y  📱 +${Number(delta)}u`}
            </div>}
            <button onClick={()=>adjustStock(stockP,delta)} disabled={!delta||Number(delta)<=0} className="hap" style={{background:delta&&Number(delta)>0?"linear-gradient(135deg,#10b981,#059669)":"#f8f9fa",color:delta&&Number(delta)>0?"#fff":"rgba(0,0,0,.3)",border:delta&&Number(delta)>0?"none":"1px solid rgba(0,0,0,.1)",borderRadius:18,padding:"16px",fontSize:15,fontWeight:700,cursor:delta&&Number(delta)>0?"pointer":"not-allowed",boxShadow:delta&&Number(delta)>0?"0 8px 24px rgba(16,185,129,.3)":"none"}}>Confirmar Ingreso</button>
          </div>
        )}
      </Sheet>

      {/* AQUÍ SE AÑADIÓ 'role={role}' PARA QUE EL FORMULARIO SEPA DE QUÉ COLOR PINTAR EL BOTÓN */}
      <Sheet open={!!editP} onClose={()=>setEditP(null)} title={editP?.id?"✏️ Editar producto":"✨ Nuevo producto"}>
        {editP&&<FormProducto prod={editP} onSave={saveProduct} onClose={()=>setEditP(null)} accent={accent} allCats={allCats} role={role}/>}
      </Sheet>

    </div>
  );
}

/* ── DASHBOARD ── */
function Dashboard({orders,productos,transfers}){
  const accent="#a855f7"; // Lila admin
  const confirmed=orders.filter(o=>!["cancelado","pago_pendiente"].includes(o.status));
  const totalRev=confirmed.reduce((s,o)=>s+o.total,0);
  const todayO=orders.filter(o=>new Date(o.createdAt).toDateString()===new Date().toDateString());
  const pendPay=orders.filter(o=>["pago_pendiente","pago_recibido"].includes(o.status));
  const pendTrf=transfers.filter(t=>t.status==="pendiente");
  const byChannel={tienda:0,live:0};
  confirmed.forEach(o=>{byChannel[o.channel]=(byChannel[o.channel]||0)+o.total;});
  const topProds=useMemo(()=>{const m={};orders.forEach(o=>o.items.forEach(it=>{if(!m[it.pid])m[it.pid]={pid:it.pid,rev:0,qty:0};m[it.pid].rev+=it.price*it.qty;m[it.pid].qty+=it.qty;}));return Object.values(m).sort((a,b)=>b.rev-a.rev).slice(0,5);},[orders]);
  const last7=useMemo(()=>{const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const rev=orders.filter(o=>new Date(o.createdAt).toDateString()===d.toDateString()&&o.status!=="cancelado").reduce((s,o)=>s+o.total,0);days.push({label:d.toLocaleDateString("es",{weekday:"short"}),rev});}return days;},[orders]);
  const maxRev=Math.max(...last7.map(d=>d.rev),1);
  const sellerStats=useMemo(()=>{const m={};orders.filter(o=>o.status!=="cancelado").forEach(o=>{const s=o.seller||"?";if(!m[s])m[s]={seller:s,rev:0,count:0};m[s].rev+=o.total;m[s].count++;});return Object.values(m).sort((a,b)=>b.rev-a.rev);},[orders]);
  return(
    <div style={{height:"100%",overflowY:"auto",padding:"16px 16px 32px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontWeight:900,fontSize:20,letterSpacing:-0.5,color:"#111"}}>Dashboard ✦</div>
        <div style={{fontSize:10,color:"#a855f7",background:"rgba(168,85,247,.1)",border:"1px solid rgba(168,85,247,.2)",borderRadius:10,padding:"4px 10px",fontWeight:700}}>SOLO ADMIN</div>
      </div>
      {(pendPay.length>0||pendTrf.length>0)&&(
        <div style={{display:"flex",gap:10,marginBottom:14}}>
          {pendPay.length>0&&<div style={{flex:1,background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.2)",borderRadius:16,padding:"12px 14px",display:"flex",gap:10,alignItems:"center"}}><div style={{fontSize:22,animation:"pulse 2s infinite"}}>🔔</div><div><div style={{fontWeight:800,fontSize:13,color:"#d97706"}}>{pendPay.length} pagos</div><div style={{fontSize:10,color:"rgba(0,0,0,.5)"}}>por verificar</div></div></div>}
          {pendTrf.length>0&&<div style={{flex:1,background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:16,padding:"12px 14px",display:"flex",gap:10,alignItems:"center"}}><div style={{fontSize:22,animation:"pulse 2s infinite"}}>🔀</div><div><div style={{fontWeight:800,fontSize:13,color:"#dc2626"}}>{pendTrf.length} traspasos</div><div style={{fontSize:10,color:"rgba(0,0,0,.5)"}}>sin confirmar</div></div></div>}
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[{l:"Total facturado",v:f(totalRev),c:accent,icon:"💰",sub:`${confirmed.length} pedidos`},{l:"Hoy",v:f(todayO.reduce((s,o)=>s+o.total,0)),c:"#0ea5e9",icon:"📅",sub:`${todayO.length} ventas`},{l:"🏪 Tienda",v:f(byChannel.tienda),c:"#f43f5e",icon:"🏪",sub:"canal físico"},{l:"📱 Live/WA",v:f(byChannel.live),c:"#ec4899",icon:"📱",sub:"canal online"}].map((st,i)=>(
          <div key={i} style={{background:"#fff",border:`1px solid rgba(0,0,0,.06)`,borderRadius:20,padding:"16px 14px",boxShadow:"0 4px 16px rgba(0,0,0,.02)"}}><div style={{fontSize:22,marginBottom:6}}>{st.icon}</div><div style={{fontWeight:900,fontSize:20,color:st.c,letterSpacing:-0.5}}>{st.v}</div><div style={{fontSize:11,color:"rgba(0,0,0,.6)",marginTop:4}}>{st.l}</div><div style={{fontSize:10,color:"rgba(0,0,0,.4)",marginTop:1}}>{st.sub}</div></div>
        ))}
      </div>
      <div style={{background:"#fff",border:"1px solid rgba(0,0,0,.08)",borderRadius:22,padding:"18px 16px",marginBottom:14,boxShadow:"0 4px 20px rgba(0,0,0,.03)"}}>
        <div style={{fontSize:12,color:"rgba(0,0,0,.5)",fontWeight:700,letterSpacing:1,marginBottom:16}}>VENTAS ÚLTIMOS 7 DÍAS</div>
        <div style={{display:"flex",gap:8,alignItems:"flex-end",height:90}}>
          {last7.map((d,i)=>{const h=d.rev>0?Math.max(14,Math.round((d.rev/maxRev)*80)):6;const isT=i===6;return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}><div style={{width:"100%",height:h,background:isT?accent:d.rev>0?"rgba(168,85,247,.2)":"#f4f5f8",borderRadius:6,boxShadow:isT?`0 4px 16px ${accent}40`:"none"}}/><div style={{fontSize:9,color:isT?accent:"rgba(0,0,0,.4)",fontWeight:isT?800:500}}>{d.label}</div></div>);})}
        </div>
      </div>
      <div style={{background:"#fff",border:"1px solid rgba(0,0,0,.08)",borderRadius:22,padding:"18px 16px",marginBottom:14,boxShadow:"0 4px 20px rgba(0,0,0,.03)"}}>
        <div style={{fontSize:12,color:"rgba(0,0,0,.5)",fontWeight:700,letterSpacing:1,marginBottom:14}}>VENTAS POR CANAL</div>
        {[{ch:"tienda",l:"🏪 Tienda",c:"#f43f5e"},{ch:"live",l:"📱 Live/WA",c:"#ec4899"}].map(({ch,l,c})=>{const rev=byChannel[ch],pct=totalRev>0?Math.round((rev/totalRev)*100):0;return(<div key={ch} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:600,color:"#111"}}>{l}</span><span style={{fontWeight:800,color:c}}>{pct}% · {f(rev)}</span></div><div style={{height:8,background:"#f4f5f8",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:c,borderRadius:4}}/></div></div>);})}
      </div>
      <div style={{background:"#fff",border:"1px solid rgba(0,0,0,.08)",borderRadius:22,padding:"18px 16px",marginBottom:14,boxShadow:"0 4px 20px rgba(0,0,0,.03)"}}>
        <div style={{fontSize:12,color:"rgba(0,0,0,.5)",fontWeight:700,letterSpacing:1,marginBottom:14}}>🏆 TOP PRODUCTOS</div>
        {topProds.length===0&&<div style={{color:"rgba(0,0,0,.4)",textAlign:"center",padding:"16px 0",fontSize:13}}>Sin ventas aún</div>}
        {topProds.map((tp,i)=>{const p=productos.find(x=>x.id===tp.pid);if(!p)return null;return(<div key={tp.pid} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<topProds.length-1?"1px solid rgba(0,0,0,.06)":"none"}}><div style={{width:26,height:26,background:"#f4f5f8",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"rgba(0,0,0,.5)"}}>{i+1}</div><span style={{fontSize:20}}>{p.icon}</span><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,color:"#111"}}>{p.name}</div><div style={{fontSize:11,color:"rgba(0,0,0,.5)"}}>{tp.qty} vendidos</div></div><div style={{fontWeight:800,color:accent,fontSize:15}}>{f(tp.rev)}</div></div>);})}
      </div>
      <div style={{background:"#fff",border:"1px solid rgba(0,0,0,.08)",borderRadius:22,padding:"18px 16px",marginBottom:14,boxShadow:"0 4px 20px rgba(0,0,0,.03)"}}>
        <div style={{fontSize:12,color:"rgba(0,0,0,.5)",fontWeight:700,letterSpacing:1,marginBottom:14}}>👤 RENDIMIENTO POR VENDEDOR</div>
        {sellerStats.map((s,i)=>{const r=ROLES[s.seller]||{label:s.seller,accent:"#888",icon:"👤"};const pct=totalRev>0?Math.round((s.rev/totalRev)*100):0;return(<div key={s.seller} style={{marginBottom:i<sellerStats.length-1?16:0,paddingBottom:i<sellerStats.length-1?16:0,borderBottom:i<sellerStats.length-1?"1px solid rgba(0,0,0,.06)":"none"}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}><div style={{width:38,height:38,borderRadius:12,background:`${r.accent}15`,border:`1px solid ${r.accent}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{r.icon}</div><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:"#111"}}>{r.label}</div><div style={{fontSize:11,color:"rgba(0,0,0,.5)",marginTop:1}}>{s.count} pedidos</div></div><div style={{textAlign:"right"}}><div style={{fontWeight:900,color:r.accent,fontSize:18}}>{f(s.rev)}</div><div style={{fontSize:11,color:"rgba(0,0,0,.4)"}}>{pct}%</div></div></div><div style={{height:6,background:"#f4f5f8",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:r.accent,borderRadius:3}}/></div></div>);})}
      </div>
      {productos.some(p=>p.stockTienda<=p.stockMin||p.stockLive<=p.stockMin)&&(
        <div style={{background:"rgba(245,158,11,.05)",border:"1px solid rgba(245,158,11,.2)",borderRadius:22,padding:"18px 16px"}}>
          <div style={{fontSize:12,color:"#d97706",fontWeight:700,letterSpacing:1,marginBottom:12}}>⚠ ALERTAS DE STOCK</div>
          {productos.filter(p=>p.stockTienda<=p.stockMin||p.stockLive<=p.stockMin).map(p=>(
            <div key={p.id} style={{padding:"8px 0",borderBottom:"1px solid rgba(0,0,0,.05)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,fontWeight:600,color:"#111"}}>{p.icon} {p.name}</span>
              <div style={{display:"flex",gap:8}}>
                {p.stockTienda<=p.stockMin&&<span style={{fontWeight:800,color:p.stockTienda===0?"#ef4444":"#d97706",fontSize:13}}>🏪 {p.stockTienda}u</span>}
                {p.stockLive<=p.stockMin&&<span style={{fontWeight:800,color:p.stockLive===0?"#ef4444":"#d97706",fontSize:13}}>📱 {p.stockLive}u</span>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── APP ROOT ── */
function App(){
  const [role,setRole]=useState(null);
  const [page,setPage]=useState("venta");
  const [productos,setProductos]=useState([]);
  const [orders,setOrders]=useState([]);
  const [transfers,setTransfers]=useState([]);
  const [toasts,setToasts]=useState([]);
  const [cargando,setCargando]=useState(false);

  const toast=useCallback((type,msg)=>{const id=Date.now();setToasts(t=>[...t,{id,type,msg}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);},[]);
  const recargarProductos=useCallback(()=>{fetch(`${API_URL}/productos`).then(r=>r.json()).then(data=>setProductos(data.map(normProd))).catch(()=>toast("err","❌ Error actualizando inventario"));},[toast]);

  // AHORA FETCH DE PRODUCTOS Y PEDIDOS DE LA BD REAL
  useEffect(()=>{
    if(!role) return;
    setCargando(true);
    Promise.all([
      fetch(`${API_URL}/productos`).then(r=>r.json()),
      fetch(`${API_URL}/pedidos`).then(r=>r.json())
    ]).then(([prodsData, ordersData])=>{
      setProductos(prodsData.map(normProd));
      
      const mappedOrders = ordersData.map(o => ({
         id: o.id, seller: o.seller, client: o.client, phone: o.phone,
         channel: o.channel, status: o.status, total: o.total, subtotal: o.subtotal,
         discount: o.discount || 0, notes: o.notes || "", internalNote: o.internal_note || "",
         items: o.items || [], createdAt: o.created_at
      }));
      setOrders(mappedOrders);
      setCargando(false);
    }).catch(()=>{setCargando(false);toast("err","❌ Error conectando a la BD");});
  },[role]);

  if(!role) return <Login onLogin={r=>{setRole(r);setPage("venta");}}/>;

  const roleData=ROLES[role];
  const accent=roleData.accent;
  const pendingPay=orders.filter(o=>["pago_pendiente","pago_recibido"].includes(o.status)).length;
  const pendingTrf=transfers.filter(t=>t.status==="pendiente").length;
  const stockAlerts=productos.filter(p=>p.active&&(p.stockTienda<=p.stockMin||p.stockLive<=p.stockMin)).length;
  const canSeeTrf=role==="admin"||role==="vendedor";

  const NAV=[
    {k:"venta",i:"🛒",l:"Vender",b:0},
    {k:"pedidos",i:"📋",l:"Pedidos",b:pendingPay},
    {k:"productos",i:"📦",l:"Productos",b:stockAlerts},
    ...(canSeeTrf?[{k:"traspasos",i:"🔀",l:"Traspasos",b:pendingTrf}]:[]),
    ...(role==="admin"?[{k:"dashboard",i:"📊",l:"Stats",b:0}]:[]),
  ];

  const renderPage=()=>{
    if(cargando) return <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}><div style={{width:56,height:56,border:`3px solid rgba(0,0,0,.08)`,borderTop:`3px solid ${accent}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/><p style={{color:accent,fontWeight:700,fontSize:14,animation:"pulse 1.5s ease-in-out infinite"}}>Cargando Balespi PRO…</p></div>;
    if(page==="venta")     return <Venta role={role} productos={productos} recargarProductos={recargarProductos} orders={orders} setOrders={setOrders} transfers={transfers} setTransfers={setTransfers} toast={toast}/>;
    if(page==="pedidos")   return <Pedidos orders={orders} setOrders={setOrders} productos={productos} accent={accent} role={role} toast={toast}/>;
    if(page==="productos") return <ProductosScreen productos={productos} setProductos={setProductos} role={role} toast={toast} recargarProductos={recargarProductos}/>;
    if(page==="traspasos") return <Traspasos transfers={transfers} setTransfers={setTransfers} productos={productos} setProductos={setProductos} role={role} toast={toast}/>;
    if(page==="dashboard") return <Dashboard orders={orders} productos={productos} transfers={transfers}/>;
    return null;
  };

  /* NavItem reutilizable */
  function NavItem({n,vertical=false}){
    const active=page===n.k;
    return(
      <button onClick={()=>setPage(n.k)} className="hap" style={{
        display:"flex",flexDirection:vertical?"row":"column",
        alignItems:"center",justifyContent:vertical?"flex-start":"center",
        gap:vertical?12:3,padding:vertical?"11px 14px":"0",
        flex:vertical?undefined:1,
        background:vertical&&active?`${accent}15`:"none",
        border:vertical?`1px solid ${active?accent+"40":"transparent"}`:"none",
        borderRadius:vertical?14:0,
        marginBottom:vertical?2:0,
        position:"relative",transition:"all .2s"}}>
        <div style={{position:"relative",flexShrink:0}}>
          <span style={{fontSize:vertical?19:22,transform:active&&!vertical?"scale(1.15)":"scale(1)",transition:"transform .3s cubic-bezier(.34,1.56,.64,1)",display:"block"}}>{n.i}</span>
          {n.b>0&&<div style={{position:"absolute",top:-4,right:-6,background:"#ef4444",color:"#fff",borderRadius:10,padding:"0 4px",fontSize:9,fontWeight:900,minWidth:16,textAlign:"center",lineHeight:"16px",animation:"pulse 2s infinite"}}>{n.b}</div>}
        </div>
        <span style={{fontSize:vertical?13:10,fontWeight:active?700:500,color:active?accent:"rgba(0,0,0,.5)",transition:"color .2s",textTransform:vertical?"none":"uppercase",letterSpacing:vertical?0:.5,whiteSpace:"nowrap"}}>{n.l}</span>
        {active&&!vertical&&<div style={{position:"absolute",bottom:0,left:"22%",right:"22%",height:3,background:accent,borderRadius:"3px 3px 0 0",boxShadow:`0 -2px 8px ${accent}60`}}/>}
      </button>
    );
  }

  return(
    <>
      <Ambient rk={role}/>
      <Toasts toasts={toasts} rm={id=>setToasts(t=>t.filter(x=>x.id!==id))}/>
      <div className="shell">

        {/* SIDEBAR desktop */}
        <div className="sidebar">
          <div style={{padding:"20px 16px 16px",borderBottom:"1px solid rgba(0,0,0,.08)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:12,background:"#fff",border:"1px solid rgba(0,0,0,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:"0 4px 12px rgba(0,0,0,.03)"}}>🛒</div>
              <div><div style={{fontSize:13,fontWeight:800,color:"#111"}}>Balespi Import</div><div style={{fontSize:10,color:accent,fontWeight:600}}>{roleData.label}</div></div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",flex:1,padding:"12px 10px",gap:4}}>
            {NAV.map(n=><NavItem key={n.k} n={n} vertical={true}/>)}
          </div>
          <div style={{padding:"12px 10px",borderTop:"1px solid rgba(0,0,0,.08)"}}>
            <button onClick={()=>setRole(null)} className="hap" style={{width:"100%",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",borderRadius:12,padding:"10px 14px",color:"#dc2626",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>← Salir</button>
          </div>
        </div>

        {/* MAIN */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",zIndex:1}}>
          {/* Top bar */}
          <div style={{flexShrink:0,height:60,background:"rgba(255,255,255,.9)",backdropFilter:"blur(32px) saturate(200%)",borderBottom:"1px solid rgba(0,0,0,.08)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 18px"}}>
            <div className="main-topbar-logo" style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:32,height:32,borderRadius:10,background:"#fff",border:"1px solid rgba(0,0,0,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,boxShadow:"0 2px 8px rgba(0,0,0,.03)"}}>🛒</div>
              <div><div style={{fontSize:12,fontWeight:800,color:"#111"}}>Balespi Import</div><div style={{fontSize:10,color:accent,fontWeight:600}}>{roleData.label}</div></div>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:"#111"}}>
              {NAV.find(n=>n.k===page)?.i} {NAV.find(n=>n.k===page)?.l}
            </div>
            <button onClick={()=>setRole(null)} className="hap" style={{background:"#f8f9fa",border:"1px solid rgba(0,0,0,.1)",borderRadius:12,padding:"7px 14px",color:"rgba(0,0,0,.6)",fontSize:12,fontWeight:600}}>Salir</button>
          </div>

          {/* Content */}
          <div style={{flex:1,overflow:"hidden",position:"relative"}}>{renderPage()}</div>

          {/* Bottom nav mobile */}
          <div className="bottom-nav-mobile" style={{flexShrink:0,height:70,background:"rgba(255,255,255,.95)",backdropFilter:"blur(40px) saturate(200%)",borderTop:"1px solid rgba(0,0,0,.08)"}}>
            {NAV.map(n=><NavItem key={n.k} n={n} vertical={false}/>)}
          </div>
        </div>
      </div>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
