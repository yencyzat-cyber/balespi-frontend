<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balespi Import PRO</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0E0E12; color: white; font-family: system-ui, -apple-system, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [productos, setProductos] = useState([]);
            const [carrito, setCarrito] = useState([]);
            const [cargando, setCargando] = useState(true);
            const [procesandoPago, setProcesandoPago] = useState(false);
            
            // UI States
            const [tabActivo, setTabActivo] = useState("Vender");
            const [modalAbierto, setModalAbierto] = useState(false);

            // Contexto de Venta
            const [canal, setCanal] = useState("tienda");
            const [vendedora, setVendedora] = useState("Cajero Tienda");

            const API_URL = "https://balespi-api.onrender.com";

            const cargarProductos = () => {
                fetch(`${API_URL}/productos`)
                    .then(res => res.json())
                    .then(data => {
                        setProductos(data);
                        setCargando(false);
                    });
            };

            useEffect(() => {
                cargarProductos();
            }, []);

            // LÓGICA DE CARRITO CORREGIDA (Agrupación)
            const agregarAlCarrito = (producto) => {
                const index = carrito.findIndex(item => item.id === producto.id);
                if (index !== -1) {
                    // Si ya existe, le sumamos 1 a la cantidad
                    const nuevoCarrito = [...carrito];
                    nuevoCarrito[index].cantidad += 1;
                    setCarrito(nuevoCarrito);
                } else {
                    // Si no existe, lo agregamos con cantidad 1
                    setCarrito([...carrito, { ...producto, cantidad: 1 }]);
                }
            };

            // NUEVA FUNCIÓN: Cambiar cantidad con los botones - y +
            const cambiarCantidad = (id, delta) => {
                const nuevoCarrito = carrito.map(item => {
                    if (item.id === id) {
                        return { ...item, cantidad: item.cantidad + delta };
                    }
                    return item;
                }).filter(item => item.cantidad > 0); // Si llega a 0, se elimina automáticamente
                
                setCarrito(nuevoCarrito);
                if (nuevoCarrito.length === 0) setModalAbierto(false);
            };

            const quitarDelCarrito = (id) => {
                const nuevoCarrito = carrito.filter(item => item.id !== id);
                setCarrito(nuevoCarrito);
                if (nuevoCarrito.length === 0) setModalAbierto(false);
            };

            // Cálculo del total corregido multiplicando por la cantidad
            const totalCarrito = carrito.reduce((sum, item) => sum + (item.price_tienda * item.cantidad), 0);
            const cantidadTotalItems = carrito.reduce((sum, item) => sum + item.cantidad, 0);

            const procesarVenta = () => {
                setProcesandoPago(true);
                
                const venta = {
                    order_id: "V-" + Math.floor(Math.random() * 10000),
                    seller: vendedora,
                    client: "Cliente Mostrador",
                    phone: "",
                    channel: canal,
                    subtotal: totalCarrito,
                    discount_pct: 0,
                    total: totalCarrito,
                    notes: "Venta desde Balespi PRO",
                    items: carrito.map(item => ({
                        product_id: item.id,
                        sale_type: "unidad",
                        qty: item.cantidad, // Ahora envía la cantidad correcta
                        price_applied: item.price_tienda
                    }))
                };

                fetch(`${API_URL}/registrar_venta`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(venta)
                })
                .then(res => res.json())
                .then(data => {
                    setProcesandoPago(false);
                    if (data.estado === "exito") {
                        setCarrito([]);
                        setModalAbierto(false);
                        cargarProductos(); 
                        alert("✅ Venta registrada exitosamente");
                    } else {
                        alert("⛔ ERROR EN BD:\n" + data.detalle);
                    }
                })
                .catch(err => {
                    setProcesandoPago(false);
                    alert("❌ ERROR DE RED:\n" + err);
                });
            };

            if (cargando) return <div className="flex items-center justify-center h-screen"><p className="text-orange-500 font-bold animate-pulse text-xl">Cargando Balespi PRO...</p></div>;

            return (
                <div className="min-h-screen pb-32">
                    {/* CABECERA (Ahora abarca todo el ancho) */}
                    <header className="p-4 md:px-8 border-b border-gray-800 flex justify-between items-center bg-[#0E0E12] sticky top-0 z-10">
                        <div>
                            <h1 className="font-bold text-xl md:text-2xl text-white">Balespi Import</h1>
                            <p className="text-sm text-orange-500">{vendedora}</p>
                        </div>
                        <select 
                            value={canal} 
                            onChange={e => setCanal(e.target.value)}
                            className="bg-[#1C1C22] text-sm text-gray-300 p-2 rounded border border-gray-700 outline-none">
                            <option value="tienda">🏬 Tienda Física</option>
                            <option value="live">🔴 Live / WhatsApp</option>
                        </select>
                    </header>

                    {/* VISTA PRINCIPAL (Grilla Responsiva) */}
                    {tabActivo === "Vender" && (
                        <div className="p-4 md:p-8 max-w-7xl mx-auto">
                            <h2 className="text-2xl font-bold mb-6">¿Qué vas a vender?</h2>
                            
                            {/* Grilla que se adapta a PC y celular automáticamente */}
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
                                {productos.map(p => {
                                    const stockActual = canal === "tienda" ? p.stock_tienda : p.stock_live;
                                    return (
                                        <div key={p.id} className="bg-[#1C1C22] p-6 rounded-2xl border border-gray-800 flex flex-col items-center text-center transition hover:border-orange-500/50 hover:bg-[#25252e]">
                                            <div className="text-4xl md:text-5xl mb-3">{p.icon || '📦'}</div>
                                            <p className="font-bold text-base text-gray-200 mb-1">{p.name}</p>
                                            <p className="font-black text-xl text-white mb-1">S/ {p.price_tienda.toFixed(2)}</p>
                                            <p className="text-sm text-gray-500 mb-4">Stock: {stockActual}</p>
                                            
                                            <button 
                                                onClick={() => agregarAlCarrito(p)}
                                                disabled={stockActual <= 0}
                                                className="w-full bg-[#2A2A35] text-white py-3 rounded-xl text-sm font-bold hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed transition">
                                                {stockActual <= 0 ? "Agotado" : "+ Agregar"}
                                            </button>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    )}

                    {/* BARRA FLOTANTE NARANJA (Se centra en PC) */}
                    {carrito.length > 0 && (
                        <div className="fixed bottom-[80px] w-full left-0 flex justify-center px-4 z-20 pointer-events-none">
                            <button 
                                onClick={() => setModalAbierto(true)}
                                className="w-full max-w-xl bg-orange-500 text-white p-4 rounded-xl font-bold flex justify-between items-center shadow-lg shadow-orange-500/20 transform transition active:scale-95 pointer-events-auto">
                                <div className="flex items-center gap-3">
                                    <span className="bg-orange-700 px-3 py-1 rounded-lg">{cantidadTotalItems}</span>
                                    <span className="text-lg">Ver pedido</span>
                                </div>
                                <span className="text-xl">S/ {totalCarrito.toFixed(2)}</span>
                            </button>
                        </div>
                    )}

                    {/* NAVEGACIÓN INFERIOR (Ocupa todo el ancho pero centrada estéticamente) */}
                    <nav className="fixed bottom-0 w-full bg-[#0E0E12] border-t border-gray-800 pb-4 pt-2 z-10 flex justify-center">
                        <div className="flex justify-around w-full max-w-2xl px-2">
                            {['Vender', 'Pedidos', 'Productos', 'Stats'].map(tab => (
                                <button 
                                    key={tab} 
                                    onClick={() => setTabActivo(tab)}
                                    className={`flex flex-col items-center gap-1 p-2 rounded-lg ${tabActivo === tab ? 'text-orange-500' : 'text-gray-500 hover:text-gray-300'}`}>
                                    <span className="text-2xl">{tab === 'Vender' ? '🛒' : tab === 'Pedidos' ? '📋' : tab === 'Productos' ? '📦' : '📊'}</span>
                                    <span className="text-[11px] font-bold uppercase tracking-wider">{tab}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* MODAL DEL PEDIDO CORREGIDO (Estilo App, centrado en PC) */}
                    {modalAbierto && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-end md:items-center justify-center p-0 md:p-4">
                            <div className="bg-[#1C1C22] w-full max-w-lg md:rounded-3xl rounded-t-3xl p-6 h-[85vh] md:h-auto md:max-h-[90vh] flex flex-col relative border border-gray-800">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">Tu pedido</h2>
                                    <button onClick={() => setModalAbierto(false)} className="bg-[#2A2A35] rounded-full p-2 w-10 h-10 flex items-center justify-center hover:bg-gray-700">✕</button>
                                </div>

                                <div className="flex-1 overflow-y-auto hide-scrollbar space-y-4 mb-4 pr-2">
                                    {carrito.map((item) => (
                                        <div key={item.id} className="bg-[#121215] border border-gray-800 p-4 rounded-2xl">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="flex items-center gap-3">
                                                    <span className="text-3xl">{item.icon || '📦'}</span>
                                                    <div>
                                                        <p className="font-bold text-gray-200 text-lg">{item.name}</p>
                                                        <p className="text-sm text-gray-500">unidad · S/ {item.price_tienda.toFixed(2)} c/u</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => quitarDelCarrito(item.id)} className="text-red-500 text-sm font-bold border border-red-900/50 hover:bg-red-900/20 px-3 py-1 rounded-lg">Quitar</button>
                                            </div>
                                            
                                            <div className="flex justify-between items-center">
                                                {/* Controles de Cantidad */}
                                                <div className="flex items-center bg-[#1C1C22] rounded-xl overflow-hidden border border-gray-700">
                                                    <button onClick={() => cambiarCantidad(item.id, -1)} className="px-4 py-2 hover:bg-gray-700 font-bold text-lg">−</button>
                                                    <span className="px-4 font-black text-lg w-12 text-center">{item.cantidad}</span>
                                                    <button onClick={() => cambiarCantidad(item.id, 1)} className="px-4 py-2 hover:bg-gray-700 font-bold text-lg">+</button>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-xs text-gray-500 mb-1">subtotal</p>
                                                    <p className="font-black text-xl text-orange-500">S/ {(item.price_tienda * item.cantidad).toFixed(2)}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="border-t border-gray-800 pt-6 mt-auto">
                                    <div className="flex justify-between items-end mb-4 px-2">
                                        <p className="text-gray-400 text-sm">TOTAL<br/>{cantidadTotalItems} unidades · {carrito.length} productos</p>
                                        <p className="text-4xl font-black text-orange-500">S/ {totalCarrito.toFixed(2)}</p>
                                    </div>
                                    <button 
                                        onClick={procesarVenta}
                                        disabled={procesandoPago}
                                        className="w-full bg-orange-500 text-white p-4 rounded-2xl font-bold text-xl disabled:opacity-50 hover:bg-orange-600 transition-colors shadow-lg shadow-orange-500/20">
                                        {procesandoPago ? "⏳ Procesando..." : `Confirmar · S/ ${totalCarrito.toFixed(2)}`}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
